name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  # Manual "Run workflow" button in the Actions tab. This is the only way the
  # publish step below ever runs -- a normal push or PR never publishes.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            classifier: linux-x64
            libfile: libpzip_libdeflate.so
            javaDistribution: temurin
          - runner: ubuntu-24.04-arm
            classifier: linux-arm64
            libfile: libpzip_libdeflate.so
            javaDistribution: temurin
          - runner: windows-latest
            classifier: windows-x64
            libfile: pzip_libdeflate.dll
            javaDistribution: temurin
          - runner: windows-11-arm
            classifier: windows-arm64
            libfile: pzip_libdeflate.dll
            # Temurin doesn't publish a windows-arm64 JDK 17 build (only 21+);
            # Microsoft's OpenJDK distribution does.
            javaDistribution: microsoft
          - runner: macos-latest
            classifier: macos-arm64
            libfile: libpzip_libdeflate.dylib
            javaDistribution: temurin
          # macos-latest is arm64-only; macos-13 is GitHub's last Intel runner image.
          - runner: macos-13
            classifier: macos-x64
            libfile: libpzip_libdeflate.dylib
            javaDistribution: temurin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: ${{ matrix.javaDistribution }}
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        shell: bash
        run: ./gradlew build --no-daemon --stacktrace

      # The plugin's own runtime fallback silently swallows a missing/failed native
      # build (correct for end users on unsupported platforms), which means a
      # regression here could otherwise slip through as a plain green build. CI
      # only ever runs on the bundled platforms, so it must assert the native
      # accelerator actually got built and actually got exercised, not just that
      # the overall build succeeded.
      - name: Verify native libdeflate accelerator was built and exercised
        shell: bash
        run: |
          set -e
          nativePath="build/resources/main/natives/${{ matrix.classifier }}/${{ matrix.libfile }}"
          if [ ! -f "$nativePath" ]; then
            echo "::error::Native libdeflate accelerator was not built for ${{ matrix.classifier }} (expected $nativePath)"
            exit 1
          fi
          # wc -c, not `stat -c%s`: stat's flags differ between GNU (Linux) and BSD (macOS).
          size=$(wc -c < "$nativePath" | tr -d ' ')
          echo "Found native accelerator: $nativePath ($size bytes)"
          report="build/test-results/test/TEST-com.ljarocki.parallelzip.internal.LibdeflateNativeTest.xml"
          skipped=$(grep -o 'skipped="[0-9]*"' "$report" | head -1 | grep -o '[0-9]*')
          if [ "$skipped" != "0" ]; then
            echo "::error::LibdeflateNativeTest tests were skipped on ${{ matrix.classifier }} -- the native path was not exercised"
            exit 1
          fi
          echo "Native libdeflate accelerator verified working on ${{ matrix.classifier }}"

      # A runner can only produce its own platform's binary, so each leg
      # uploads its own native as an artifact; the "assemble" job below
      # downloads all of them and packages them into one release jar.
      - name: Upload native accelerator artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.classifier }}
          path: build/resources/main/natives/${{ matrix.classifier }}/

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.classifier }}
          path: build/reports/tests/
          retention-days: 7

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download linux-x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: merged-natives/natives/linux-x64

      - name: Download linux-arm64 native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: merged-natives/natives/linux-arm64

      - name: Download windows-x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x64
          path: merged-natives/natives/windows-x64

      - name: Download windows-arm64 native
        uses: actions/download-artifact@v4
        with:
          name: native-windows-arm64
          path: merged-natives/natives/windows-arm64

      - name: Download macos-arm64 native
        uses: actions/download-artifact@v4
        with:
          name: native-macos-arm64
          path: merged-natives/natives/macos-arm64

      - name: Download macos-x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-macos-x64
          path: merged-natives/natives/macos-x64

      - name: Verify all platform natives are present
        run: |
          set -e
          test -f merged-natives/natives/linux-x64/libpzip_libdeflate.so || { echo "::error::missing linux-x64 native"; exit 1; }
          test -f merged-natives/natives/linux-arm64/libpzip_libdeflate.so || { echo "::error::missing linux-arm64 native"; exit 1; }
          test -f merged-natives/natives/windows-x64/pzip_libdeflate.dll || { echo "::error::missing windows-x64 native"; exit 1; }
          test -f merged-natives/natives/windows-arm64/pzip_libdeflate.dll || { echo "::error::missing windows-arm64 native"; exit 1; }
          test -f merged-natives/natives/macos-arm64/libpzip_libdeflate.dylib || { echo "::error::missing macos-arm64 native"; exit 1; }
          test -f merged-natives/natives/macos-x64/libpzip_libdeflate.dylib || { echo "::error::missing macos-x64 native"; exit 1; }
          echo "All platform natives present, ready to bundle into one jar."

      # Skips compileNativeDeflate: this job only packages the natives already
      # built and verified by the matrix legs above, it doesn't recompile.
      - name: Assemble release jar with all platforms' natives
        run: ./gradlew jar -PpzipPrebuiltNativesDir=merged-natives -x compileNativeDeflate --no-daemon --stacktrace

      - name: Upload release jar
        uses: actions/upload-artifact@v4
        with:
          name: parallel-zip-plugin-jar
          path: build/libs/*.jar
          retention-days: 14

      # Only runs when someone clicks "Run workflow" in the Actions tab -- never
      # on a push or PR. Requires the GRADLE_PUBLISH_KEY / GRADLE_PUBLISH_SECRET
      # repository secrets (Settings -> Secrets and variables -> Actions).
      - name: Publish to Gradle Plugin Portal
        if: github.event_name == 'workflow_dispatch'
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins -PpzipPrebuiltNativesDir=merged-natives -x compileNativeDeflate --no-daemon --stacktrace
