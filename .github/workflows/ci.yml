name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  # Manual "Run workflow" button in the Actions tab. This is the only way the
  # publish step below ever runs -- a normal push or PR never publishes.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        shell: bash
        run: ./gradlew build --no-daemon --stacktrace

      # The plugin's own runtime fallback silently swallows a missing/failed native
      # build (correct for end users on unsupported platforms), which means a
      # regression here could otherwise slip through as a plain green build. CI
      # only ever runs on the two bundled platforms, so it must assert the native
      # accelerator actually got built and actually got exercised, not just that
      # the overall build succeeded.
      - name: Verify native libdeflate accelerator was built and exercised
        shell: bash
        run: |
          set -e
          case "${{ matrix.os }}" in
            ubuntu-latest) classifier=linux-x64; libfile=libpzip_libdeflate.so ;;
            windows-latest) classifier=windows-x64; libfile=pzip_libdeflate.dll ;;
          esac
          nativePath="build/resources/main/natives/${classifier}/${libfile}"
          if [ ! -f "$nativePath" ]; then
            echo "::error::Native libdeflate accelerator was not built for ${classifier} (expected $nativePath)"
            exit 1
          fi
          echo "Found native accelerator: $nativePath ($(stat -c%s "$nativePath") bytes)"
          report="build/test-results/test/TEST-io.github.kukis13.parallelzip.internal.LibdeflateNativeTest.xml"
          skipped=$(grep -o 'skipped="[0-9]*"' "$report" | head -1 | grep -o '[0-9]*')
          if [ "$skipped" != "0" ]; then
            echo "::error::LibdeflateNativeTest tests were skipped on ${classifier} -- the native path was not exercised"
            exit 1
          fi
          echo "Native libdeflate accelerator verified working on ${classifier}"

      - name: Determine native classifier
        id: native
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) echo "classifier=linux-x64" >> "$GITHUB_OUTPUT" ;;
            windows-latest) echo "classifier=windows-x64" >> "$GITHUB_OUTPUT" ;;
          esac

      # A Linux runner can't produce the Windows binary and vice versa, so each
      # leg uploads its own native as an artifact; the "assemble" job below
      # downloads both and packages them into one release jar.
      - name: Upload native accelerator artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ steps.native.outputs.classifier }}
          path: build/resources/main/natives/${{ steps.native.outputs.classifier }}/

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: build/reports/tests/
          retention-days: 7

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download linux-x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: merged-natives/natives/linux-x64

      - name: Download windows-x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x64
          path: merged-natives/natives/windows-x64

      - name: Verify both platform natives are present
        run: |
          set -e
          test -f merged-natives/natives/linux-x64/libpzip_libdeflate.so || { echo "::error::missing linux-x64 native"; exit 1; }
          test -f merged-natives/natives/windows-x64/pzip_libdeflate.dll || { echo "::error::missing windows-x64 native"; exit 1; }
          echo "Both platform natives present, ready to bundle into one jar."

      # Skips compileNativeDeflate: this job only packages the natives already
      # built and verified by the two matrix legs above, it doesn't recompile.
      - name: Assemble release jar with both platforms' natives
        run: ./gradlew jar -PpzipPrebuiltNativesDir=merged-natives -x compileNativeDeflate --no-daemon --stacktrace

      - name: Upload release jar
        uses: actions/upload-artifact@v4
        with:
          name: parallel-zip-plugin-jar
          path: build/libs/*.jar
          retention-days: 14

      # Only runs when someone clicks "Run workflow" in the Actions tab -- never
      # on a push or PR. Requires the GRADLE_PUBLISH_KEY / GRADLE_PUBLISH_SECRET
      # repository secrets (Settings -> Secrets and variables -> Actions).
      - name: Publish to Gradle Plugin Portal
        if: github.event_name == 'workflow_dispatch'
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins -PpzipPrebuiltNativesDir=merged-natives -x compileNativeDeflate --no-daemon --stacktrace
